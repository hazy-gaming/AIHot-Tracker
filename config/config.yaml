# 目标网站配置
source:
  api_url: "https://aihot.virxact.com/api/public/items"
  rss_url: null  # 禁用 RSS，使用 API（字段更完整）
  default_mode: "all"  # 监听全部动态
  default_category: null

# 轮询配置
polling:
  base_interval: 60           # 基础间隔：1 分钟（更快）
  min_interval: 60            # 最小间隔：1 分钟
  max_interval: 300           # 最大间隔：5 分钟
  empty_threshold: 10         # 连续 10 次空轮询后延长间隔
  work_hours:
    start: 0
    end: 24
    interval: 60              # 全天 1 分钟间隔
  off_hours_interval: 180     # 非工作时间：3 分钟

# 推送配置
push:
  channels:
    feishu:
      enabled: true
      webhook_url: "${FEISHU_WEBHOOK_URL}"
      secret: "${FEISHU_WEBHOOK_SECRET}"
    wechat:
      enabled: false
      webhook_url: ""

# 消息配置
message:
  max_items_per_message: 10
  merge_threshold: 3
  include_summary: true
  include_source: true
  include_category: true

# 存储配置
storage:
  db_path: "./data/aihot_tracker.db"
  log_path: "./logs/aihot_tracker.log"
  backup_enabled: true
  backup_interval_days: 7
